services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sourcing
      POSTGRES_PASSWORD: sourcing
      POSTGRES_DB: sourcing
    ports:
      # Host port is overridable (PG_PORT) to avoid clashing with other local
      # Postgres instances. Default 5432; this repo's .env uses 5433.
      - "${PG_PORT:-5432}:5432"
    volumes:
      - sourcing_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcing -d sourcing"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - sourcing_ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sourcing_pg:
  sourcing_ollama:
